<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SerenityOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family: Arial;
background:#f4f7fb;
padding:40px;
}

.header{
font-size:30px;
font-weight:bold;
margin-bottom:30px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.metric{
font-size:40px;
color:#2563eb;
font-weight:bold;
}

.button{
background:#2563eb;
color:white;
padding:20px;
border-radius:15px;
border:none;
font-size:18px;
width:100%;
cursor:pointer;
margin-top:20px;
}

</style>
</head>

<body>

<div class="header">SerenityOS</div>

<div class="card">
<h3>Ritmo cardíaco</h3>
<div class="metric">92 lpm</div>
</div>

<div class="card">
<h3>Presión arterial</h3>
<div class="metric">120/80</div>
</div>

<div class="card">
<h3>Medicamento</h3>
<p>Lisinopril 10mg tomado hace 1h</p>
</div>

<button class="button">
Llamada de Emergencia
</button>

</body>
</html>
